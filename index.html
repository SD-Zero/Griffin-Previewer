<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animal Jam Griffin Previewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: #eee; font-family: 'Verdana', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; text-align: center; background: #222; border-bottom: 2px solid #ff9d00; }
        model-viewer { flex: 1; width: 100%; background: radial-gradient(#333, #000); }
        .ui-panel { padding: 15px; background: #222; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .group { border: 1px solid #444; padding: 10px; border-radius: 10px; background: #2d2d2d; }
        h4 { margin: 0 0 10px 0; font-size: 14px; color: #ff9d00; text-transform: uppercase; }
        button { background: #444; color: white; border: 1px solid #666; padding: 8px 12px; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #ff9d00; color: black; }
    </style>
</head>
<body>

<header>
    <h2>Griffin 3D Previewer</h2>
</header>

<model-viewer id="griffin" 
    src="Griffin_LQ_Body_Mesh.glb" 
    camera-controls 
    auto-rotate 
    shadow-intensity="1" 
    environment-image="neutral"
    exposure="1">
    
    <model-viewer id="crest-layer" src="Crest_1.glb" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></model-viewer>
</model-viewer>

<div class="ui-panel">
    <div class="group">
        <h4>Patterns</h4>
        <button onclick="changePattern('Griffin_Pattern00_HQ.png')">Pattern 00</button>
        <button onclick="changePattern('Griffin_Pattern01_HQ.png')">Pattern 01</button>
        <button onclick="changePattern('Griffin_Pattern02_HQ.png')">Pattern 02</button>
        <button onclick="changePattern('Griffin_Pattern03_HQ.png')">Pattern 03</button>
        <button onclick="changePattern('Griffin_Pattern04_HQ.png')">Pattern 04</button>
    </div>

    <div class="group">
        <h4>Crest</h4>
        <button onclick="toggleCrest(true)">Crest 1</button>
        <button onclick="toggleCrest(false)">None</button>
    </div>
</div>

<script>
    const griffinModel = document.querySelector('#griffin');
    const crestModel = document.querySelector('#crest-layer');

    async function changePattern(fileName) {
        // This ensures the pattern applies to the base griffin
        const material = griffinModel.model.materials[0];
        const texture = await griffinModel.createTexture(fileName);
        material.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
    }

    function toggleCrest(isVisible) {
        crestModel.style.display = isVisible ? "block" : "none";
    }
</script>

</body>
</html>
