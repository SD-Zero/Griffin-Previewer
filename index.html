<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Previewer</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: #222; text-align: center; border-bottom: 2px solid #ff9d00; }
        .viewer-container { flex: 1; background: radial-gradient(#333, #000); position: relative; }
        model-viewer { width: 100%; height: 100%; }
        .ui-panel { padding: 15px; background: #222; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; z-index: 100; }
        .group { border: 1px solid #444; padding: 10px; border-radius: 10px; background: #2d2d2d; text-align: center; }
        button { background: #444; color: white; border: 1px solid #666; padding: 10px; border-radius: 5px; min-width: 60px; }
        button.active { background: #ff9d00; color: black; }
    </style>
</head>
<body>

<header><h2 style="margin:0;">Griffin Previewer</h2></header>

<div class="viewer-container">
    <model-viewer id="griffin" 
        src="Griffin_LQ_Body_Mesh.glb" 
        camera-controls 
        auto-rotate 
        bounds="tight" 
        exposure="1.2">
        
        </model-viewer>
</div>

<div class="ui-panel">
    <div class="group">
        <h4>Patterns</h4>
        <button onclick="applyAll('Griffin_Pattern00_HQ.png')">00</button>
        <button onclick="applyAll('Griffin_Pattern01_HQ.png')">01</button>
        <button onclick="applyAll('Griffin_Pattern02_HQ.png')">02</button>
    </div>
    <div class="group">
        <h4>Head Piece</h4>
        <button id="crestBtn" onclick="toggleCrest()">Toggle Crest</button>
    </div>
</div>

<script>
    const viewer = document.querySelector('#griffin');
    let crestInstance = null;

    async function toggleCrest() {
        const btn = document.querySelector('#crestBtn');
        
        // If crest doesn't exist, create it as a 'child' of the scene
        if (!crestInstance) {
            const scene = viewer.shadowRoot.querySelector('.container');
            
            // We create a second internal model
            crestInstance = document.createElement('model-viewer');
            crestInstance.src = "Crest_1.glb";
            crestInstance.setAttribute('center-model', 'false');
            crestInstance.style.position = "absolute";
            crestInstance.style.top = "0";
            crestInstance.style.left = "0";
            crestInstance.style.width = "100%";
            crestInstance.style.height = "100%";
            crestInstance.style.pointerEvents = "none";
            
            // Force the crest to sync with the Griffin's camera
            viewer.addEventListener('camera-change', () => {
                crestInstance.cameraOrbit = viewer.cameraOrbit;
                crestInstance.fieldOfView = viewer.fieldOfView;
                crestInstance.cameraTarget = viewer.getCameraTarget();
            });

            viewer.appendChild(crestInstance);
            btn.classList.add('active');
        } else {
            // Remove it
            crestInstance.remove();
            crestInstance = null;
            btn.classList.remove('active');
        }
    }

    async function applyAll(img) {
        if (!viewer.model) return;
        const texture = await viewer.createTexture(img);
        
        // Apply to Body
        viewer.model.materials.forEach(mat => {
            if (mat.pbrMetallicRoughness.baseColorTexture) {
                mat.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
            }
        });

        // Apply to Crest if it is currently toggled on
        if (crestInstance && crestInstance.model) {
            crestInstance.model.materials.forEach(mat => {
                if (mat.pbrMetallicRoughness.baseColorTexture) {
                    mat.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
                }
            });
        }
    }
</script>

</body>
</html>
