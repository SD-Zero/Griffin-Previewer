<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Character Creator</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .viewer-container { flex: 1; position: relative; background: radial-gradient(#333, #000); }
        model-viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #griffin { z-index: 1; pointer-events: auto; }
        #crest-v, #wings-v, #tail-v { z-index: 2; pointer-events: none; }

        /* SIDEBAR STYLING */
        .sidebar { 
            width: 320px; background: #222; border-left: 2px solid #ff9d00; 
            display: flex; flex-direction: column; overflow-y: auto; padding: 10px;
        }

        h2 { font-size: 16px; color: #ff9d00; text-align: center; margin: 10px 0; border-bottom: 1px solid #444; padding-bottom: 10px; }

        /* ACCORDION DROPDOWNS */
        details { margin-bottom: 5px; background: #2d2d2d; border-radius: 4px; }
        summary { 
            padding: 12px; font-weight: bold; cursor: pointer; background: #333; 
            display: flex; justify-content: space-between; list-style: none;
        }
        summary::after { content: '▼'; font-size: 10px; color: #ff9d00; }
        details[open] summary::after { content: '▲'; }

        /* NESTED PALETTES */
        .palette-group { background: #1a1a1a; padding: 5px; border-top: 1px solid #444; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; }
        
        /* COLOR SWATCHES */
        .swatch { 
            width: 100%; aspect-ratio: 1; border-radius: 3px; border: 1px solid #555; 
            cursor: pointer; font-size: 0; /* hides text */
        }
        .random-btn { 
            grid-column: span 4; background: #444; color: #ff9d00; border: 1px solid #ff9d00;
            padding: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-top: 5px;
        }

        .button-stack { display: flex; flex-direction: column; padding: 10px; gap: 5px; }
        button.part-btn { background: #444; color: white; border: 1px solid #555; padding: 10px; text-align: left; border-radius: 4px; }
        button:active { background: #ff9d00; color: black; }
    </style>
</head>
<body>

<div class="viewer-container">
    <model-viewer id="griffin" src="Griffin_LQ_Body_Mesh.glb" camera-controls interaction-prompt="none" shadow-intensity="1" exposure="1.2"></model-viewer>
    <model-viewer id="crest-v" src="" interaction-prompt="none" center-model="false"></model-viewer>
    <model-viewer id="wings-v" src="" interaction-prompt="none" center-model="false"></model-viewer>
    <model-viewer id="tail-v" src="" interaction-prompt="none" center-model="false"></model-viewer>
</div>

<div class="sidebar">
    <h2>GRIFFIN EDITOR</h2>

    <details class="main-nav"><summary>Patterns</summary><div class="button-stack">
        <button class="part-btn" onclick="changePattern('Griffin_Pattern00_HQ.png')">Drifter</button>
        <button class="part-btn" onclick="changePattern('Griffin_Pattern01_HQ.png')">Duochrome</button>
        <button class="part-btn" onclick="changePattern('Griffin_Pattern02_HQ.png')">Shining</button>
        <button class="part-btn" onclick="changePattern('Griffin_Pattern03_HQ.png')">Stealthy</button>
        <button class="part-btn" onclick="changePattern('Griffin_Pattern04_HQ.png')">Harfang</button>
    </div></details>

    <details class="main-nav"><summary>Crests</summary><div class="button-stack">
        <button class="part-btn" onclick="changePart('crest', 'Bestial_Crest.glb')">Bestial</button>
        <button class="part-btn" onclick="changePart('crest', 'Pinnacle_Crest.glb')">Pinnacle</button>
        <button class="part-btn" onclick="changePart('crest', 'Windswept_Crest.glb')">Windswept</button>
        <button class="part-btn" onclick="changePart('crest', 'Harpy_Crest.glb')">Harpy</button>
        <button class="part-btn" onclick="changePart('crest', '')">None</button>
    </div></details>

    <details class="main-nav"><summary>Wings</summary><div class="button-stack">
        <button class="part-btn" onclick="changePart('wings', 'Heroic_Wings.glb')">Heroic</button>
        <button class="part-btn" onclick="changePart('wings', 'Osprey_Wings.glb')">Osprey</button>
        <button class="part-btn" onclick="changePart('wings', 'Manticore_Wings.glb')">Manticore</button>
        <button class="part-btn" onclick="changePart('wings', 'Scarab_Wings.glb')">Scarab</button>
        <button class="part-btn" onclick="changePart('wings', 'Seraph_Wings.glb')">Seraph</button>
        <button class="part-btn" onclick="changePart('wings', '')">None</button>
    </div></details>

    <details class="main-nav"><summary>Tails</summary><div class="button-stack">
        <button class="part-btn" onclick="changePart('tail', 'Fanned_Tail.glb')">Fanned</button>
        <button class="part-btn" onclick="changePart('tail', 'Quetzal_Tail.glb')">Quetzal</button>
        <button class="part-btn" onclick="changePart('tail', 'Svelte_Tail.glb')">Svelte</button>
        <button class="part-btn" onclick="changePart('tail', 'Tufted_Tail.glb')">Tufted</button>
        <button class="part-btn" onclick="changePart('tail', 'Scorpio_Tail.glb')">Scorpio</button>
        <button class="part-btn" onclick="changePart('tail', '')">None</button>
    </div></details>

    <details class="main-nav"><summary>Primary Color</summary><div id="primary-container"></div></details>
    <details class="main-nav"><summary>Secondary Color</summary><div id="secondary-container"></div></details>
    <details class="main-nav"><summary>Tertiary Color</summary><div id="tertiary-container"></div></details>
</div>

<script>
    const paletteData = [
        { name: "Amethyst Wildflower", count: 12 }, { name: "Cerulean Sky", count: 14 },
        { name: "Dreamy Lilac", count: 15 }, { name: "Dusty Taupe", count: 13 },
        { name: "Earthy Umber", count: 15 }, { name: "Flaxen Ochre", count: 16 },
        { name: "Florid Vermillion", count: 14 }, { name: "Forested Juniper", count: 14 },
        { name: "Hazel Olive", count: 15 }, { name: "Lush Berry", count: 13 },
        { name: "Misty Starlight", count: 13 }, { name: "Oceanic Sapphire", count: 15 },
        { name: "Opulant Royalty", count: 14 }, { name: "Pale Pastel", count: 15 },
        { name: "Rosy Sunset", count: 14 }, { name: "Russet Mahogany", count: 12 },
        { name: "Seafoam Lagoon", count: 14 }, { name: "Shady Dark", count: 17 },
        { name: "Smoky Dust", count: 13 }, { name: "Sunny Amber", count: 14 },
        { name: "Verdant Lush", count: 15 }, { name: "Vibrant Neon", count: 18 },
        { name: "Warm Tangerine", count: 15 }
    ];

    // Build the color palettes
    ["primary", "secondary", "tertiary"].forEach(section => {
        const container = document.getElementById(`${section}-container`);
        paletteData.forEach(p => {
            const det = document.createElement('details');
            det.className = "palette-group";
            det.innerHTML = `<summary style="font-size:12px;">${p.name} (${p.count})</summary><div class="color-grid" id="${section}-${p.name.replace(/\s/g, '')}"></div>`;
            container.appendChild(det);
            
            const grid = det.querySelector('.color-grid');
            for(let i=0; i<p.count; i++) {
                const s = document.createElement('div');
                s.className = "swatch";
                s.style.background = `hsl(${(i * 360) / p.count}, 50%, 50%)`; // Placeholder color
                s.onclick = () => console.log(`Set ${section} to Color ${i+1}`);
                grid.appendChild(s);
            }
            const rand = document.createElement('button');
            rand.className = "random-btn";
            rand.innerText = "RANDOM";
            rand.onclick = () => {
                const swatches = grid.querySelectorAll('.swatch');
                swatches[Math.floor(Math.random() * swatches.length)].click();
            };
            grid.appendChild(rand);
        });
    });

    // ACCORDION LOGIC: Only one main nav can be open
    const allDetails = document.querySelectorAll('details.main-nav');
    allDetails.forEach(targetDetail => {
        targetDetail.addEventListener('click', () => {
            allDetails.forEach(detail => {
                if (detail !== targetDetail) detail.removeAttribute('open');
            });
        });
    });

    // --- PREVIOUS 3D LOGIC ---
    const main = document.querySelector('#griffin');
    const parts = { crest: document.querySelector('#crest-v'), wings: document.querySelector('#wings-v'), tail: document.querySelector('#tail-v') };
    let currentPattern = 'Griffin_Pattern00_HQ.png';

    main.addEventListener('camera-change', () => {
        const target = main.getCameraTarget();
        Object.values(parts).forEach(v => {
            v.cameraOrbit = main.cameraOrbit;
            v.fieldOfView = main.fieldOfView;
            v.cameraTarget = `${target.x}m ${target.y}m ${target.z}m`;
        });
    });

    function changePart(type, file) {
        parts[type].src = file;
        parts[type].addEventListener('load', () => applyPatternToAll(), { once: true });
    }

    async function changePattern(fileName) {
        currentPattern = fileName;
        applyPatternToAll();
    }

    async function applyPatternToAll() {
        const viewers = [main, ...Object.values(parts)];
        for (const v of viewers) {
            if (v.src && v.model) {
                const texture = await v.createTexture(currentPattern);
                v.model.materials.forEach(mat => {
                    if (mat.pbrMetallicRoughness.baseColorTexture) {
                        mat.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
                    }
                });
            }
        }
    }
</script>

</body>
</html>
