<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Previewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; text-align: center; background: #222; border-bottom: 2px solid #ff9d00; }
        .viewer-container { flex: 1; position: relative; background: radial-gradient(#333, #000); }
        model-viewer { width: 100%; height: 100%; }
        .ui-panel { padding: 15px; background: #222; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; overflow-y: auto; }
        .group { border: 1px solid #444; padding: 10px; border-radius: 10px; background: #2d2d2d; }
        h4 { margin: 0 0 10px 0; font-size: 14px; color: #ff9d00; }
        button { background: #444; color: white; border: 1px solid #666; padding: 10px; cursor: pointer; border-radius: 5px; margin: 2px; }
        button:hover { background: #ff9d00; color: black; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">Griffin 3D Previewer</h2>
</header>

<div class="viewer-container">
    <model-viewer id="griffin" 
        src="Griffin_LQ_Body_Mesh.glb" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1" 
        environment-image="neutral"
        exposure="1"
        bounds="tight"
        camera-orbit="auto auto auto">
        
        <model-viewer id="crest-layer" 
            src="Crest_1.glb" 
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"
            bounds="tight">
        </model-viewer>
    </model-viewer>
</div>

<div class="ui-panel">
    <div class="group">
        <h4>Patterns</h4>
        <button onclick="changePattern('Griffin_Pattern00_HQ.png')">00</button>
        <button onclick="changePattern('Griffin_Pattern01_HQ.png')">01</button>
        <button onclick="changePattern('Griffin_Pattern02_HQ.png')">02</button>
        <button onclick="changePattern('Griffin_Pattern03_HQ.png')">03</button>
        <button onclick="changePattern('Griffin_Pattern04_HQ.png')">04</button>
    </div>

    <div class="group">
        <h4>Crest</h4>
        <button onclick="toggleCrest(true)">Show</button>
        <button onclick="toggleCrest(false)">None</button>
    </div>
</div>

<script>
    const griffinModel = document.querySelector('#griffin');
    const crestModel = document.querySelector('#crest-layer');

    async function changePattern(fileName) {
        if (!griffinModel.model) return;
        const material = griffinModel.model.materials[0];
        const texture = await griffinModel.createTexture(fileName);
        if (material.pbrMetallicRoughness && material.pbrMetallicRoughness.baseColorTexture) {
            material.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
        }
    }

    function toggleCrest(isVisible) {
        crestModel.style.display = isVisible ? "block" : "none";
    }
</script>

</body>
</html>
