<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Creator Pro</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .viewer-container { flex: 1; position: relative; background: radial-gradient(#333, #000); }
        
        /* Force every viewer to be a perfect overlay */
        model-viewer { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            --poster-color: transparent;
            background-color: transparent;
        }

        #griffin { z-index: 1; }
        #crest-v, #wings-v, #tail-v { z-index: 2; pointer-events: none; visibility: hidden; }
        #eyes-v { z-index: 3; pointer-events: none; }

        .sidebar { width: 320px; background: #222; border-left: 2px solid #ff9d00; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; }
        h2 { font-size: 14px; color: #ff9d00; text-align: center; letter-spacing: 2px; margin: 10px 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        details { margin-bottom: 5px; background: #2d2d2d; border-radius: 4px; }
        summary { padding: 12px; font-weight: bold; cursor: pointer; background: #333; display: flex; justify-content: space-between; font-size: 13px; }
        .button-stack { display: flex; flex-direction: column; padding: 10px; gap: 5px; }
        button.part-btn { background: #444; color: #ddd; border: 1px solid #555; padding: 10px; text-align: left; border-radius: 4px; cursor: pointer; font-size: 12px; }
        button.part-btn:hover { background: #555; border-color: #ff9d00; }
        select.part-select { background: #444; color: white; border: 1px solid #555; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 12px; width: 100%; }
        .palette-group { background: #1a1a1a; padding: 5px; border-top: 1px solid #333; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; }
        .swatch { width: 100%; aspect-ratio: 1; border-radius: 3px; cursor: pointer; border: 1px solid #444; transition: transform 0.1s; }
        .swatch:hover { transform: scale(1.1); border-color: white; }
    </style>
</head>
<body>

<div class="viewer-container">
    <model-viewer id="griffin" src="griffin.glb" camera-controls auto-rotate interaction-prompt="none" shadow-intensity="1" exposure="1.2" environment-image="neutral"></model-viewer>
    <model-viewer id="crest-v" src="" interaction-prompt="none" exposure="1.2" environment-image="neutral"></model-viewer>
    <model-viewer id="wings-v" src="" interaction-prompt="none" exposure="1.2" environment-image="neutral"></model-viewer>
    <model-viewer id="tail-v" src="" interaction-prompt="none" exposure="1.2" environment-image="neutral"></model-viewer>
    <model-viewer id="eyes-v" src="Griffin_LQ_Eyes_Mesh.glb" interaction-prompt="none" exposure="1.2" environment-image="neutral"></model-viewer>
</div>

<div class="sidebar">
    <h2>GRIFFIN SYSTEM</h2>
    
    <details open><summary>PATTERNS</summary><div class="button-stack">
        <button class="part-btn" onclick="changePattern('Griffin_Pattern00_HQ.png')">DRIFTER</button>
        <button class="part-btn" onclick="changePattern('Griffin_Pattern02_HQ.png')">DUOCHROME</button>
        <button class="part-btn" onclick="changePattern('Griffin_Pattern01_HQ.png')">SHINING</button>
        <button class="part-btn" onclick="changePattern('Griffin_Pattern03_HQ.png')">STEALTHY</button>
        <button class="part-btn" onclick="changePattern('Griffin_Pattern04_HQ.png')">HARFANG</button>
    </div></details>

    <details open><summary>EYES</summary><div class="button-stack">
        <button class="part-btn" onclick="changeEyeModel('Griffin_LQ_Eyes_Mesh.glb')">Standard Eyes</button>
        <button class="part-btn" onclick="changeEyeModel('Griffin_LQ_Eyelash_Mesh.glb')">Eyelash Eyes</button>
        <hr style="border:0; border-top:1px solid #444; margin:5px 0;">
        <select class="part-select" onchange="changeEyeShape(this.value)">
            <option value="Eye00_Texture.png">Ordinary</option>
            <option value="Eye01_Texture.png">Surprised</option>
            <option value="Eye02_Texture.png">Cute</option>
            <option value="Eye03_Texture.png">Creepy</option>
            <option value="Eye04_Texture.png">Spooky</option>
            <option value="Eye05_Texture.png">Swirly</option>
            <option value="Eye06_Texture.png">Blank</option>
            <option value="Eye07_Texture.png">Crossed Out</option>
            <option value="Eye08_Texture.png">Starry</option>
            <option value="Eye09_Texture.png">Lovely</option>
            <option value="Eye10_Texture.png">Suspicious</option>
            <option value="Eye11_Texture.png">Striking</option>
        </select>
    </div></details>

    <details><summary>CRESTS</summary><div class="button-stack">
        <button class="part-btn" onclick="changePart('crest', 'bestial.glb')">BESTIAL</button>
        <button class="part-btn" onclick="changePart('crest', 'pinnacle.glb')">PINNACLE</button>
        <button class="part-btn" onclick="changePart('crest', 'windswept.glb')">WINDSWEPT</button>
        <button class="part-btn" onclick="changePart('crest', 'harpy.glb')">HARPY</button>
        <button class="part-btn" onclick="changePart('crest', '')">NONE</button>
    </div></details>

    <details><summary>WINGS</summary><div class="button-stack">
        <button class="part-btn" onclick="changePart('wings', 'heroic.glb')">HEROIC</button>
        <button class="part-btn" onclick="changePart('wings', 'osprey.glb')">OSPREY</button>
        <button class="part-btn" onclick="changePart('wings', 'manticore.glb')">MANTICORE</button>
        <button class="part-btn" onclick="changePart('wings', 'scarab.glb')">SCARAB</button>
        <button class="part-btn" onclick="changePart('wings', 'seraph.glb')">SERAPH</button>
        <button class="part-btn" onclick="changePart('wings', '')">NONE</button>
    </div></details>

    <details><summary>TAILS</summary><div class="button-stack">
        <button class="part-btn" onclick="changePart('tail', 'fanned.glb')">FANNED</button>
        <button class="part-btn" onclick="changePart('tail', 'svelte.glb')">SVELTE</button>
        <button class="part-btn" onclick="changePart('tail', 'tufted.glb')">TUFTED</button>
        <button class="part-btn" onclick="changePart('tail', 'scorpio.glb')">SCORPIO</button>
        <button class="part-btn" onclick="changePart('tail', '')">NONE</button>
    </div></details>

    <details><summary>PRIMARY COLOR</summary><div id="primary-container"></div></details>
    <details><summary>SECONDARY COLOR</summary><div id="secondary-container"></div></details>
    <details><summary>TERTIARY COLOR</summary><div id="tertiary-container"></div></details>
    <details><summary>EYE COLOR</summary><div id="eye-container"></div></details>
</div>

<script>
    const paletteData = [
        { name: "Amethyst Wildflower", count: 12 }, { name: "Cerulean Sky", count: 14 },
        { name: "Dreamy Lilac", count: 15 }, { name: "Dusty Taupe", count: 13 },
        { name: "Earthy Umber", count: 15 }, { name: "Flaxen Ochre", count: 16 },
        { name: "Florid Vermillion", count: 14 }, { name: "Forested Juniper", count: 14 },
        { name: "Hazel Olive", count: 15 }, { name: "Lush Berry", count: 13 },
        { name: "Misty Starlight", count: 13 }, { name: "Oceanic Sapphire", count: 15 },
        { name: "Opulant Royalty", count: 14 }, { name: "Pale Pastel", count: 15 },
        { name: "Rosy Sunset", count: 14 }, { name: "Russet Mahogany", count: 12 },
        { name: "Seafoam Lagoon", count: 14 }, { name: "Shady Dark", count: 17 },
        { name: "Smoky Dust", count: 13 }, { name: "Sunny Amber", count: 14 },
        { name: "Verdant Lush", count: 15 }, { name: "Vibrant Neon", count: 18 },
        { name: "Warm Tangerine", count: 15 }
    ];

    const main = document.querySelector('#griffin');
    const eyeViewer = document.querySelector('#eyes-v');
    const parts = { crest: document.querySelector('#crest-v'), wings: document.querySelector('#wings-v'), tail: document.querySelector('#tail-v') };
    
    let colors = { primary: {r:255, g:255, b:255}, secondary: {r:255, g:255, b:255}, tertiary: {r:255, g:255, b:255}, eye: {r:255, g:255, b:255} };
    let currentPattern = 'Griffin_Pattern00_HQ.png';
    let currentEyeShape = 'Eye00_Texture.png';

    ["primary", "secondary", "tertiary", "eye"].forEach(type => {
        const container = document.getElementById(`${type}-container`);
        paletteData.forEach(p => {
            const det = document.createElement('details');
            det.className = "palette-group";
            det.innerHTML = `<summary style="font-size:11px; color:#aaa;">${p.name}</summary><div class="color-grid"></div>`;
            container.appendChild(det);
            const grid = det.querySelector('.color-grid');
            for(let i=0; i<p.count; i++) {
                const s = document.createElement('div');
                s.className = "swatch";
                const h = (i * 360) / p.count;
                s.style.background = `hsl(${h}, 70%, 55%)`;
                s.onclick = () => { colors[type] = hslToRgb(h, 0.7, 0.55); updateAll(); };
                grid.appendChild(s);
            }
        });
    });

    async function processTexture(imgSrc, isEye = false) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = imgSrc;
        await img.decode();
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            
            if (isEye) {
                // TINT ONLY: Pure multiplication by luminance. 
                // This forces the black model parts to stay black.
                data[i] = colors.eye.r * lum;
                data[i+1] = colors.eye.g * lum;
                data[i+2] = colors.eye.b * lum;
            } else {
                if (lum < 0.05) continue; 
                let target = null;
                let intensity = 1.0;
                if (r > 60 && r > g * 1.3 && r > b * 1.3) {
                    target = colors.primary;
                    intensity = Math.pow(r / 255, 0.85) * 1.05;
                } else if (r > 100 && g > 100 && b < 140) {
                    target = colors.secondary;
                    intensity = lum / 0.9;
                } else if (b > 50 || (r > 100 && b > 100) || (g > 100 && r < 120)) {
                    target = colors.tertiary;
                    intensity = Math.pow(Math.max(r, g, b) / 255, 0.75) * 0.95;
                }
                if (target) {
                    const factor = Math.min(intensity, 1.1);
                    data[i] = target.r * factor; data[i+1] = target.g * factor; data[i+2] = target.b * factor;
                }
            }
        }
        ctx.putImageData(imageData, 0, 0);
        return canvas.toDataURL();
    }

    async function updateAll() {
        const bodyBake = await processTexture(currentPattern);
        if (main.model) {
            for (const mat of main.model.materials) {
                const n = mat.name.toLowerCase();
                if (!n.includes("wing") && !n.includes("tail") && !n.includes("crest")) {
                    const tex = await main.createTexture(bodyBake);
                    if (mat.pbrMetallicRoughness.baseColorTexture) mat.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                } else {
                    mat.setAlphaMode("BLEND");
                    mat.pbrMetallicRoughness.setBaseColorFactor([0,0,0,0]);
                }
            }
        }
        
        for (const [key, v] of Object.entries(parts)) {
            if (v.getAttribute('src') && v.model) {
                const raw = (key === 'wings') ? 'Griffin_Wings.png' : 'Griffin_Tails_Crests.png';
                const bake = await processTexture(raw);
                for (const mat of v.model.materials) {
                    if (mat.name.toLowerCase().includes(key.substring(0,3))) {
                        const tex = await v.createTexture(bake);
                        if (mat.pbrMetallicRoughness.baseColorTexture) mat.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
                    } else {
                        mat.setAlphaMode("BLEND");
                        mat.pbrMetallicRoughness.setBaseColorFactor([0,0,0,0]);
                    }
                }
                v.style.visibility = "visible";
            }
        }

        const eyeBake = await processTexture(currentEyeShape, true);
        if (eyeViewer.model) {
            for (const mat of eyeViewer.model.materials) {
                const tex = await eyeViewer.createTexture(eyeBake);
                if (mat.pbrMetallicRoughness.baseColorTexture) mat.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
            }
        }
    }

    function changeEyeModel(file) {
        eyeViewer.setAttribute('src', file);
        eyeViewer.addEventListener('model-visibility', () => {
            // Force reset on load
            sync();
            updateAll();
        }, { once: true });
    }

    function changeEyeShape(file) {
        currentEyeShape = file;
        updateAll();
    }

    function hslToRgb(h, s, l) {
        const f = (n, k = (n + h / 30) % 12) => l - s * Math.min(l, 1 - l) * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return { r: Math.round(f(0) * 255), g: Math.round(f(8) * 255), b: Math.round(f(4) * 255) };
    }

    // STRICT SYNC: No individual framing allowed
    function sync() {
        const orbit = main.getCameraOrbit();
        const fov = main.getFieldOfView();
        const target = main.getCameraTarget();
        
        const viewers = [...Object.values(parts), eyeViewer];
        viewers.forEach(v => {
            if(v.getAttribute('src')) {
                v.cameraOrbit = `${orbit.theta}rad ${orbit.phi}rad ${orbit.radius}m`;
                v.fieldOfView = `${fov}deg`;
                v.cameraTarget = `${target.x}m ${target.y}m ${target.z}m`;
                v.jumpCameraToGoal();
            }
        });
        requestAnimationFrame(sync);
    }
    sync();

    function changePart(type, file) {
        const v = parts[type]; v.style.visibility = "hidden";
        if (!file) { v.removeAttribute('src'); return; }
        v.setAttribute('src', file);
        v.addEventListener('model-visibility', () => updateAll(), { once: true });
    }

    function changePattern(file) { currentPattern = file; updateAll(); }
    
    window.onload = () => { 
        changePart('crest', 'bestial.glb'); 
        changePart('wings', 'manticore.glb'); 
        changePart('tail', 'fanned.glb'); 
    };
    main.addEventListener('model-visibility', updateAll);
</script>
</body>
</html>
