<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Previewer | Unofficial AJPW</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-green: #081a08;
            --charcoal: #151515;
            --border-glow: rgba(57, 255, 20, 0.3);
        }

        body { margin: 0; background: #000; color: white; font-family: 'Georgia', serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- BRANDED INITIALIZING SCREEN --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 1s ease; overflow: hidden;
        }
        .logo-wrap { text-align: center; margin-bottom: 50px; position: relative; z-index: 2; }
        .sub-logo { font-size: 10px; letter-spacing: 3px; color: var(--neon-green); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: block; opacity: 0.8; }
        .main-logo { font-size: 28px; letter-spacing: 6px; color: #fff; text-transform: uppercase; font-weight: 900; text-shadow: 0 0 20px rgba(57, 255, 20, 0.4); }

        .spinner-container { position: relative; width: 80px; height: 80px; margin-bottom: 25px; }
        .spin-diamond {
            position: absolute; width: 10px; height: 16px;
            background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            left: 35px; top: 0; transform-origin: 5px 40px;
            animation: diamond-spin 1.4s infinite linear; opacity: 0;
        }
        .spin-diamond:nth-child(1) { animation-delay: 0s; }
        .spin-diamond:nth-child(2) { animation-delay: -0.15s; }
        .spin-diamond:nth-child(3) { animation-delay: -0.30s; }
        .spin-diamond:nth-child(4) { animation-delay: -0.45s; }
        @keyframes diamond-spin { 0% { transform: rotate(0deg); opacity: 1; } 100% { transform: rotate(360deg); opacity: 0; } }

        .stars { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(1px 1px at 25px 35px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 60px 120px, #fff, rgba(0,0,0,0)); background-size: 400px 400px; opacity: 0.3; }
        .diamond-container { position: absolute; width: 100%; height: 100%; opacity: 0.05; pointer-events: none; }
        .bg-diamond { position: absolute; background: var(--neon-green); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); animation: pulse 8s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 320px; background: #000; 
            border-left: 5px solid;
            border-image: linear-gradient(to bottom, var(--neon-green), var(--dark-green)) 1;
            display: flex; flex-direction: column; 
            overflow-y: auto; padding: 20px 15px;
        }

        /* Section Dividers */
        .section-header {
            font-size: 11px; letter-spacing: 3px; color: #fff;
            text-transform: uppercase; margin: 25px 0 10px 0;
            text-align: center; font-weight: bold;
        }
        .divider { height: 1px; background: #333; margin: 10px 0; border: none; }

        /* Buttons & Controls */
        .random-box { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .rnd-btn { 
            background: var(--charcoal); color: #fff; 
            border: 1px solid #333; padding: 10px; 
            font-size: 10px; cursor: pointer; 
            border-radius: 4px; text-transform: uppercase;
            transition: background 0.2s;
        }
        .rnd-btn:hover { background: #252525; border-color: var(--neon-green); }
        .rnd-all { background: #222; border-color: #444; font-weight: bold; color: var(--neon-green); }

        /* Main Pill Dropdowns */
        summary { 
            list-style: none; padding: 10px 20px; font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            border-radius: 50px; color: white;
            border: 1.5px solid var(--dark-green); /* Thinner outline */
            background: linear-gradient(180deg, #222 0%, #000 50%); /* Darker shine */
            box-shadow: 0 0 0 1px var(--border-glow);
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 5px;
        }
        summary::-webkit-details-marker { display: none; }

        /* Inner Content */
        .button-stack { display: flex; flex-direction: column; padding: 8px 5px; gap: 5px; }
        button.part-btn { 
            background: var(--charcoal); color: #ccc; border: none; 
            padding: 9px; text-align: center; border-radius: 4px; cursor: pointer; font-size: 10px; 
        }
        button.part-btn:hover { color: #fff; background: #1a1a1a; }
        
        select.part-select { 
            background: #111; color: #fff; border: 1px solid #222; 
            padding: 10px; border-radius: 4px; width: 100%; cursor: pointer; font-size: 10px;
        }
        
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 10px; }
        .swatch { width: 100%; aspect-ratio: 1; border-radius: 2px; cursor: pointer; border: 1px solid #222; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 45vh; border-left: none; border-top: 5px solid var(--neon-green); }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="stars"></div>
    <div class="diamond-container" id="diamond-bg"></div>
    <div class="logo-wrap">
        <span class="sub-logo">Unofficial AJPW</span>
        <h1 class="main-logo">Griffin Previewer</h1>
    </div>
    <div class="spinner-container">
        <div class="spin-diamond"></div><div class="spin-diamond"></div><div class="spin-diamond"></div><div class="spin-diamond"></div>
    </div>
    <p class="loading-text">Initializing Assets</p>
</div>

<div style="flex: 1; position: relative; background: radial-gradient(#1a1a1a, #000);">
    <model-viewer id="griffin" src="griffin-main.glb" camera-controls auto-rotate interaction-prompt="none" shadow-intensity="1" exposure="1.2" environment-image="neutral"></model-viewer>
</div>

<div class="sidebar">
    <div class="random-box">
        <button class="rnd-btn rnd-all" onclick="randomizeAll()">Randomize All</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button class="rnd-btn" onclick="randomizeTraits()">Randomize Traits</button>
            <button class="rnd-btn" onclick="randomizeColors()">Randomize Colors</button>
        </div>
    </div>

    <div class="divider"></div>
    <div class="section-header">Traits</div>
    <div class="divider"></div>

    <details><summary>Crest</summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('crest', 'bestial')">BESTIAL</button>
            <button class="part-btn" onclick="togglePart('crest', 'pinnacle')">PINNACLE</button>
            <button class="part-btn" onclick="togglePart('crest', 'windswept')">WINDSWEPT</button>
            <button class="part-btn" onclick="togglePart('crest', 'harpy')">HARPY</button>
            <button class="part-btn" onclick="togglePart('crest', 'none')">NONE</button>
        </div>
    </details>

    <details open><summary>Eye Shape</summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('eye', 'Mesh_Eyes_Normal')">Standard Eyes</button>
            <button class="part-btn" onclick="togglePart('eye', 'Mesh_Eyes_Lashes')">Eyelash Eyes</button>
            <select id="eyeShapeSelect" class="part-select" onchange="changeEyeShape(this.value)">
                <option value="Eye00_Texture.png">Ordinary</option>
                <option value="Eye01_Texture.png">Surprised</option>
                <option value="Eye02_Texture.png">Cute</option>
                <option value="Eye03_Texture.png">Creepy</option>
                <option value="Eye04_Texture.png">Spooky</option>
                <option value="Eye05_Texture.png">Swirly</option>
                <option value="Eye06_Texture.png">Blank</option>
                <option value="Eye07_Texture.png">Crossed Out</option>
                <option value="Eye08_Texture.png">Starry</option>
                <option value="Eye09_Texture.png">Lovely</option>
                <option value="Eye10_Texture.png">Suspicious</option>
                <option value="Eye11_Texture.png">Striking</option>
            </select>
        </div>
    </details>

    <details><summary>Wings</summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('wing', 'heroic')">HEROIC</button>
            <button class="part-btn" onclick="togglePart('wing', 'osprey')">OSPREY</button>
            <button class="part-btn" onclick="togglePart('wing', 'manticore')">MANTICORE</button>
            <button class="part-btn" onclick="togglePart('wing', 'scarab')">SCARAB</button>
            <button class="part-btn" onclick="togglePart('wing', 'seraph')">SERAPH</button>
            <button class="part-btn" onclick="togglePart('wing', 'none')">NONE</button>
        </div>
    </details>

    <details><summary>Tail</summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('tail', 'fanned')">FANNED</button>
            <button class="part-btn" onclick="togglePart('tail', 'svelte')">SVELTE</button>
            <button class="part-btn" onclick="togglePart('tail', 'tufted')">TUFTED</button>
            <button class="part-btn" onclick="togglePart('tail', 'scorpio')">SCORPIO</button>
            <button class="part-btn" onclick="togglePart('tail', 'quetzal')">QUETZAL</button>
        </div>
    </details>

    <div class="divider"></div>
    <div class="section-header">Color & Pattern</div>
    <div class="divider"></div>

    <details><summary>Body Pattern</summary>
        <div class="button-stack">
            <button class="part-btn" onclick="changePattern('Griffin_Pattern00_HQ.png')">DRIFTER</button>
            <button class="part-btn" onclick="changePattern('Griffin_Pattern02_HQ.png')">DUOCHROME</button>
            <button class="part-btn" onclick="changePattern('Griffin_Pattern01_HQ.png')">SHINING</button>
            <button class="part-btn" onclick="changePattern('Griffin_Pattern03_HQ.png')">STEALTHY</button>
            <button class="part-btn" onclick="changePattern('Griffin_Pattern04_HQ.png')">HARFANG</button>
        </div>
    </details>

    <details><summary>Eye Color</summary><div id="eye-container"></div></details>
    <details><summary>Primary Color</summary><div id="primary-container"></div></details>
    <details><summary>Secondary Color</summary><div id="secondary-container"></div></details>
    <details><summary>Tertiary Color</summary><div id="tertiary-container"></div></details>
    
    <div class="divider"></div>
</div>

<script>
    // Logic initialization
    const dbg = document.getElementById('diamond-bg');
    for(let i=0; i<25; i++) {
        const d = document.createElement('div'); d.className = 'bg-diamond';
        const size = 80 + Math.random() * 100;
        d.style.width = `${size}px`; d.style.height = `${size * 1.4}px`;
        d.style.left = `${Math.random() * 100}%`; d.style.top = `${Math.random() * 100}%`;
        d.style.animationDelay = `${Math.random() * 5}s`; dbg.appendChild(d);
    }

    const main = document.querySelector('#griffin');
    let colors = { primary: {r:255, g:255, b:255}, secondary: {r:255, g:255, b:255}, tertiary: {r:255, g:255, b:255}, eye: {r:255, g:255, b:255} };
    let currentPattern = 'Griffin_Pattern00_HQ.png';
    let currentEyeShape = 'Eye00_Texture.png';
    let activeParts = { eye: 'Mesh_Eyes_Normal', crest: 'bestial', wing: 'manticore', tail: 'fanned' };

    const offscreenCanvas = document.createElement('canvas');
    const offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

    function randomizeAll() { randomizeTraits(); randomizeColors(); }

    function randomizeTraits() {
        const lists = { crest:['bestial','pinnacle','windswept','harpy','none'], wing:['heroic','osprey','manticore','scarab','seraph','none'], tail:['fanned','svelte','tufted','scorpio','quetzal'] };
        activeParts.crest = lists.crest[Math.floor(Math.random()*lists.crest.length)];
        activeParts.wing = lists.wing[Math.floor(Math.random()*lists.wing.length)];
        activeParts.tail = lists.tail[Math.floor(Math.random()*lists.tail.length)];
        currentPattern = ['Griffin_Pattern00_HQ.png','Griffin_Pattern01_HQ.png','Griffin_Pattern02_HQ.png','Griffin_Pattern03_HQ.png','Griffin_Pattern04_HQ.png'][Math.floor(Math.random()*5)];
        updateAll();
    }

    function randomizeColors() {
        const rnd = () => hslToRgb(Math.random() * 360, 0.6, 0.5);
        colors.primary = rnd(); colors.secondary = rnd(); colors.tertiary = rnd(); colors.eye = rnd();
        updateAll();
    }

    async function processTexture(imgSrc, isEye = false) {
        const img = new Image(); img.crossOrigin = "anonymous"; img.src = imgSrc; await img.decode();
        offscreenCanvas.width = img.width; offscreenCanvas.height = img.height;
        offscreenCtx.drawImage(img, 0, 0);
        const imageData = offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height), data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            if (isEye) {
                if (r > 120 && g > 100) { 
                    const factor = (r + g) / 510;
                    data[i] = colors.eye.r * factor; data[i+1] = colors.eye.g * factor; data[i+2] = colors.eye.b * factor;
                } else { data[i]=0; data[i+1]=0; data[i+2]=0; }
            } else {
                const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                if (lum < 0.03) continue;
                let target = null;
                if (r > 60 && r > g * 1.5 && r > b * 1.5) target = colors.primary;
                else if (g > 70 && ((r > 70) || (g > r * 1.1)) && b < 170) target = colors.secondary;
                else if (b > 50 || (r > 100 && b > 100)) target = colors.tertiary;
                if (target) { data[i] = target.r; data[i+1] = target.g; data[i+2] = target.b; }
            }
        }
        offscreenCtx.putImageData(imageData, 0, 0); return offscreenCanvas.toDataURL();
    }

    function togglePart(type, name) {
        activeParts[type] = name;
        if (!main.model) return;
        const scene = main[Object.getOwnPropertySymbols(main).find(s => s.description === 'scene')];
        scene.traverse((obj) => {
            if (obj.isMesh || obj.isGroup) {
                const n = obj.name.toLowerCase();
                if (type === 'eye') {
                    if (n.includes('normal')) obj.visible = (name === 'Mesh_Eyes_Normal');
                    if (n.includes('lashes')) obj.visible = (name === 'Mesh_Eyes_Lashes');
                } else {
                    const valid = ['bestial','pinnacle','windswept','harpy','heroic','osprey','manticore','scarab','seraph','fanned','svelte','tufted','scorpio','quetzal'];
                    if (valid.includes(n)) obj.visible = (n === name.toLowerCase());
                }
            }
        });
    }

    async function updateAll() {
        if (!main.model) return;
        const bodyBake = await processTexture(currentPattern);
        const wingBake = await processTexture('Griffin_Wings.png');
        const tcBake = await processTexture('Griffin_Tails_Crests.png');
        const eyeBake = await processTexture(currentEyeShape, true);
        const materialMap = { "Mat_GriffinBody": bodyBake, "Mat_Wings": wingBake, "Mat_Tails_Crests": tcBake, "Mat_Eyes": eyeBake };
        for (const mat of main.model.materials) {
            if (materialMap[mat.name]) {
                const tex = await main.createTexture(materialMap[mat.name]);
                if (mat.pbrMetallicRoughness.baseColorTexture) mat.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
            }
        }
        Object.keys(activeParts).forEach(t => togglePart(t, activeParts[t]));
        const loader = document.getElementById('loading-overlay');
        if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 1000); }
    }

    ["primary", "secondary", "tertiary", "eye"].forEach(type => {
        const grid = document.createElement('div'); grid.className = "color-grid";
        document.getElementById(`${type}-container`).appendChild(grid);
        for(let i=0; i<20; i++) {
            const s = document.createElement('div'); s.className = "swatch"; const h = (i * 360) / 20; s.style.background = `hsl(${h}, 60%, 50%)`;
            s.onclick = () => { colors[type] = hslToRgb(h, 0.6, 0.5); updateAll(); }; grid.appendChild(s);
        }
    });

    function changeEyeShape(f) { currentEyeShape = f; updateAll(); }
    function changePattern(f) { currentPattern = f; updateAll(); }
    function hslToRgb(h, s, l) { const f = (n, k = (n + h / 30) % 12) => l - s * Math.min(l, 1 - l) * Math.max(Math.min(k - 3, 9 - k, 1), -1); return { r: Math.round(f(0) * 255), g: Math.round(f(8) * 255), b: Math.round(f(4) * 255) }; }
    main.addEventListener('load', updateAll);
</script>
</body>
</html>
