<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Previewer | Unofficial AJPW</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- BRANDED INITIALIZING SCREEN --- */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.8s ease; overflow: hidden; }
        .logo-wrap { text-align: center; margin-bottom: 50px; position: relative; z-index: 2; }
        .sub-logo { font-size: 10px; letter-spacing: 3px; color: #00d4ff; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: block; opacity: 0.8; }
        .main-logo { font-size: 28px; letter-spacing: 6px; color: #fff; text-transform: uppercase; font-weight: 900; text-shadow: 0 0 20px rgba(0, 212, 255, 0.6); }
        
        .spinner-container { position: relative; width: 80px; height: 80px; margin-bottom: 25px; }
        .spin-diamond { position: absolute; width: 10px; height: 16px; background: #00d4ff; box-shadow: 0 0 10px #00d4ff; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); left: 35px; top: 0; transform-origin: 5px 40px; animation: diamond-spin 1.4s infinite linear; opacity: 0; }
        .spin-diamond:nth-child(1) { animation-delay: 0s; opacity: 1; }
        .spin-diamond:nth-child(2) { animation-delay: -0.15s; opacity: 0.7; }
        .spin-diamond:nth-child(3) { animation-delay: -0.30s; opacity: 0.4; }
        .spin-diamond:nth-child(4) { animation-delay: -0.45s; opacity: 0.1; }
        
        @keyframes diamond-spin { 0% { transform: rotate(0deg); opacity: 1; } 100% { transform: rotate(360deg); opacity: 0; } }

        .stars { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(1px 1px at 25px 35px, #fff, rgba(0,0,0,0)), radial-gradient(1px 1px at 60px 120px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 180px 190px, #fff, rgba(0,0,0,0)); background-size: 400px 400px; opacity: 0.4; animation: twinkle 5s infinite alternate; }
        .diamond-container { position: absolute; width: 100%; height: 100%; opacity: 0.08; pointer-events: none; }
        .bg-diamond { position: absolute; background: linear-gradient(135deg, #00d4ff 0%, #9b51e0 100%); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); animation: pulse 8s infinite ease-in-out; }
        .shimmer-sweep { position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); transform: skewX(-20deg); animation: sweep 6s infinite; }
        @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.6; } }
        @keyframes sweep { 0% { left: -120%; } 100% { left: 220%; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.08); opacity: 1; } }
        .loading-text { font-size: 11px; letter-spacing: 4px; color: #888; text-transform: uppercase; font-weight: 300; }

        /* --- VIEWER & SIDEBAR --- */
        .viewer-container { flex: 1; position: relative; background: radial-gradient(#333, #000); }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
        
        .sidebar { width: 320px; background: #000; border-left: 2px solid #00d4ff; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; transition: all 0.3s ease; box-shadow: -5px 0 20px rgba(0, 212, 255, 0.2); }
        
        .random-box { display: grid; grid-template-columns: 1fr; gap: 5px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .rnd-btn { background: #00d4ff; color: #000; border: none; padding: 10px; font-weight: bold; font-size: 10px; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: 0.3s; }
        .rnd-btn:hover { background: #fff; box-shadow: 0 0 10px #00d4ff; }

        .section-label { font-size: 11px; letter-spacing: 2px; color: #fff; margin-top: 15px; margin-bottom: 5px; padding-left: 5px; }
        .section-divider { border: 0; border-top: 1px solid #333; margin-bottom: 10px; width: 100%; }

        details { margin-bottom: 5px; background: #111; border-radius: 4px; border: 1px solid #222; }
        summary { padding: 12px; font-weight: bold; cursor: pointer; background: #111; display: flex; justify-content: space-between; align-items: center; font-size: 13px; list-style: none; color: #00d4ff; }
        
        .lock-icon { cursor: pointer; font-size: 14px; padding: 0 5px; transition: transform 0.1s; }
        .lock-icon:hover { transform: scale(1.2); }
        .lock-icon.locked { color: #ff4444; }

        .button-stack { display: flex; flex-direction: column; padding: 10px; gap: 5px; }
        button.part-btn { background: #222; color: #ddd; border: 1px solid #333; padding: 10px; text-align: left; border-radius: 4px; cursor: pointer; font-size: 12px; }
        button.part-btn:hover { background: #333; border-color: #00d4ff; }
        
        select.part-select, .palette-select { background: #222; color: white; border: 1px solid #333; padding: 10px; border-radius: 4px; width: 100%; cursor: pointer; font-size: 12px; }

        .palette-group { background: #0a0a0a; padding: 5px; border-top: 1px solid #222; display: none; }
        .palette-group.active { display: block; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; }
        .swatch { width: 100%; aspect-ratio: 1; border-radius: 3px; cursor: pointer; border: 1px solid #444; transition: transform 0.1s; }
        .swatch:hover { transform: scale(1.1); border-color: white; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 45vh; border-left: none; border-top: 2px solid #00d4ff; }
            .viewer-container { height: 55vh; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="stars"></div>
    <div class="diamond-container" id="diamond-bg"></div>
    <div class="shimmer-sweep"></div>
    <div class="logo-wrap">
        <span class="sub-logo">Unofficial AJPW</span>
        <h1 class="main-logo">Griffin Previewer</h1>
    </div>
    <div class="spinner-container">
        <div class="spin-diamond"></div>
        <div class="spin-diamond"></div>
        <div class="spin-diamond"></div>
        <div class="spin-diamond"></div>
    </div>
    <p class="loading-text">Initializing Assets</p>
</div>

<div class="viewer-container">
    <model-viewer id="griffin" src="griffin-main.glb" camera-controls auto-rotate interaction-prompt="none" shadow-intensity="1" exposure="1.2" environment-image="neutral"></model-viewer>
</div>

<div class="sidebar">
    <div class="random-box">
        <button class="rnd-btn" onclick="randomizeAll()" style="background:#fff; border: 2px solid #00d4ff;">Randomize All</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px;">
            <button class="rnd-btn" onclick="randomizeTraits()">Random Traits</button>
            <button class="rnd-btn" onclick="randomizeColors()">Random Colors</button>
        </div>
    </div>

    <div class="section-label">TRAITS</div>
    <hr class="section-divider">

    <details open>
        <summary>CREST <span class="lock-icon" id="lock-crest" onclick="toggleLock(event, 'crest')">🔓</span></summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('crest', 'bestial')">BESTIAL</button>
            <button class="part-btn" onclick="togglePart('crest', 'pinnacle')">PINNACLE</button>
            <button class="part-btn" onclick="togglePart('crest', 'windswept')">WINDSWEPT</button>
            <button class="part-btn" onclick="togglePart('crest', 'harpy')">HARPY</button>
            <button class="part-btn" onclick="togglePart('crest', 'none')">NONE</button>
        </div>
    </details>

    <details>
        <summary>WINGS <span class="lock-icon" id="lock-wing" onclick="toggleLock(event, 'wing')">🔓</span></summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('wing', 'heroic')">HEROIC</button>
            <button class="part-btn" onclick="togglePart('wing', 'osprey')">OSPREY</button>
            <button class="part-btn" onclick="togglePart('wing', 'manticore')">MANTICORE</button>
            <button class="part-btn" onclick="togglePart('wing', 'scarab')">SCARAB</button>
            <button class="part-btn" onclick="togglePart('wing', 'seraph')">SERAPH</button>
            <button class="part-btn" onclick="togglePart('wing', 'none')">NONE</button>
        </div>
    </details>

    <details>
        <summary>TAIL <span class="lock-icon" id="lock-tail" onclick="toggleLock(event, 'tail')">🔓</span></summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('tail', 'fanned')">FANNED</button>
            <button class="part-btn" onclick="togglePart('tail', 'svelte')">SVELTE</button>
            <button class="part-btn" onclick="togglePart('tail', 'tufted')">TUFTED</button>
            <button class="part-btn" onclick="togglePart('tail', 'scorpio')">SCORPIO</button>
            <button class="part-btn" onclick="togglePart('tail', 'quetzal')">QUETZAL</button>
        </div>
    </details>

    <details>
        <summary>EYE SHAPE <span class="lock-icon" id="lock-eyeshape" onclick="toggleLock(event, 'eyeshape')">🔓</span></summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('eye', 'Mesh_Eyes_Normal')">Standard Eyes</button>
            <button class="part-btn" onclick="togglePart('eye', 'Mesh_Eyes_Lashes')">Eyelash Eyes</button>
            <hr style="border:0; border-top:1px solid #333; margin:5px 0;">
            <select id="eyeShapeSelect" class="part-select" onchange="changeEyeShape(this.value)">
                <option value="Eye00_Texture.png">Ordinary</option>
                <option value="Eye01_Texture.png">Surprised</option>
                <option value="Eye02_Texture.png">Cute</option>
                <option value="Eye03_Texture.png">Creepy</option>
                <option value="Eye04_Texture.png">Spooky</option>
                <option value="Eye05_Texture.png">Swirly</option>
                <option value="Eye06_Texture.png">Blank</option>
                <option value="Eye07_Texture.png">Crossed Out</option>
                <option value="Eye08_Texture.png">Starry</option>
                <option value="Eye09_Texture.png">Lovely</option>
                <option value="Eye10_Texture.png">Suspicious</option>
                <option value="Eye11_Texture.png">Striking</option>
            </select>
        </div>
    </details>

    <details>
        <summary>PATTERN <span class="lock-icon" id="lock-pattern" onclick="toggleLock(event, 'pattern')">🔓</span></summary>
        <div class="button-stack">
            <button class="part-btn" onclick="changePattern('Griffin_Pattern00_HQ.png')">DRIFTER</button>
            <button class="part-btn" onclick="changePattern('Griffin_Pattern02_HQ.png')">DUOCHROME</button>
            <button class="part-btn" onclick="changePattern('Griffin_Pattern01_HQ.png')">SHINING</button>
            <button class="part-btn" onclick="changePattern('Griffin_Pattern03_HQ.png')">STEALTHY</button>
            <button class="part-btn" onclick="changePattern('Griffin_Pattern04_HQ.png')">HARFANG</button>
        </div>
    </details>

    <hr class="section-divider" style="margin-top:20px;">
    <div class="section-label">COLORING</div>
    <hr class="section-divider">

    <details>
        <summary>EYE COLOR <span class="lock-icon" id="lock-eye-color" onclick="toggleLock(event, 'eye-color')">🔓</span></summary>
        <div class="button-stack">
            <select class="palette-select" onchange="switchPalette('eye', this.value)"></select>
            <div id="eye-container"></div>
        </div>
    </details>

    <details>
        <summary>PRIMARY COLOR <span class="lock-icon" id="lock-primary-color" onclick="toggleLock(event, 'primary-color')">🔓</span></summary>
        <div class="button-stack">
            <select class="palette-select" onchange="switchPalette('primary', this.value)"></select>
            <div id="primary-container"></div>
        </div>
    </details>

    <details>
        <summary>SECONDARY COLOR <span class="lock-icon" id="lock-secondary-color" onclick="toggleLock(event, 'secondary-color')">🔓</span></summary>
        <div class="button-stack">
            <select class="palette-select" onchange="switchPalette('secondary', this.value)"></select>
            <div id="secondary-container"></div>
        </div>
    </details>

    <details>
        <summary>TERTIARY COLOR <span class="lock-icon" id="lock-tertiary-color" onclick="toggleLock(event, 'tertiary-color')">🔓</span></summary>
        <div class="button-stack">
            <select class="palette-select" onchange="switchPalette('tertiary', this.value)"></select>
            <div id="tertiary-container"></div>
        </div>
    </details>

    <hr class="section-divider" style="margin-top:20px;">
</div>

<script>
    const locks = {
        crest: false, wing: false, tail: false, eyeshape: false, pattern: false,
        'eye-color': false, 'primary-color': false, 'secondary-color': false, 'tertiary-color': false
    };

    function toggleLock(event, key) {
        event.preventDefault();
        event.stopPropagation();
        locks[key] = !locks[key];
        const el = event.target;
        el.textContent = locks[key] ? '🔒' : '🔓';
        el.classList.toggle('locked', locks[key]);
    }

    const dbg = document.getElementById('diamond-bg');
    for(let i=0; i<35; i++) {
        const d = document.createElement('div');
        d.className = 'bg-diamond';
        const size = 100 + Math.random() * 120;
        d.style.width = `${size}px`; d.style.height = `${size * 1.5}px`;
        d.style.left = `${Math.random() * 100}%`; d.style.top = `${Math.random() * 100}%`;
        d.style.animationDelay = `${Math.random() * 5}s`;
        dbg.appendChild(d);
    }

    const paletteData = [
        { name: "Amethyst Wildflower", count: 12 }, { name: "Cerulean Sky", count: 14 }, { name: "Dreamy Lilac", count: 15 }, 
        { name: "Dusty Taupe", count: 13 }, { name: "Earthy Umber", count: 15 }, { name: "Flaxen Ochre", count: 16 }, 
        { name: "Florid Vermillion", count: 14 }, { name: "Forested Juniper", count: 14 }, { name: "Hazel Olive", count: 15 }, 
        { name: "Lush Berry", count: 13 }, { name: "Misty Starlight", count: 13 }, { name: "Oceanic Sapphire", count: 15 }, 
        { name: "Opulant Royalty", count: 14 }, { name: "Pale Pastel", count: 15 }, { name: "Rosy Sunset", count: 14 }, 
        { name: "Russet Mahogany", count: 12 }, { name: "Seafoam Lagoon", count: 14 }, { name: "Shady Dark", count: 17 }, 
        { name: "Smoky Dust", count: 13 }, { name: "Sunny Amber", count: 14 }, { name: "Verdant Lush", count: 15 }, 
        { name: "Vibrant Neon", count: 18 }, { name: "Warm Tangerine", count: 15 }
    ];

    const crestList = ['bestial', 'pinnacle', 'windswept', 'harpy', 'none'];
    const wingList = ['heroic', 'osprey', 'manticore', 'scarab', 'seraph', 'none'];
    const tailList = ['fanned', 'svelte', 'tufted', 'scorpio', 'quetzal'];
    const patternList = ['Griffin_Pattern00_HQ.png', 'Griffin_Pattern02_HQ.png', 'Griffin_Pattern01_HQ.png', 'Griffin_Pattern03_HQ.png', 'Griffin_Pattern04_HQ.png'];
    const eyeTextureList = Array.from({length: 12}, (_, i) => `Eye${i.toString().padStart(2, '0')}_Texture.png`);

    const main = document.querySelector('#griffin');
    let colors = { primary: {r:255, g:255, b:255}, secondary: {r:255, g:255, b:255}, tertiary: {r:255, g:255, b:255}, eye: {r:255, g:255, b:255} };
    let currentPattern = 'Griffin_Pattern00_HQ.png';
    let currentEyeShape = 'Eye00_Texture.png';
    let activeParts = { eye: 'Mesh_Eyes_Normal', crest: 'bestial', wing: 'manticore', tail: 'fanned' };

    const offscreenCanvas = document.createElement('canvas');
    const offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

    document.querySelectorAll('details').forEach((det) => {
        det.addEventListener('toggle', () => {
            if (det.open) {
                document.querySelectorAll('details').forEach((other) => {
                    if (other !== det) other.removeAttribute('open');
                });
            }
        });
    });

    function randomizeAll() { randomizeTraits(); randomizeColors(); }

    function randomizeTraits() {
        if (!locks.eyeshape) {
            activeParts.eye = Math.random() > 0.5 ? 'Mesh_Eyes_Normal' : 'Mesh_Eyes_Lashes';
            currentEyeShape = eyeTextureList[Math.floor(Math.random() * eyeTextureList.length)];
            document.getElementById('eyeShapeSelect').value = currentEyeShape;
        }
        if (!locks.crest) activeParts.crest = crestList[Math.floor(Math.random() * crestList.length)];
        if (!locks.wing) activeParts.wing = wingList[Math.floor(Math.random() * wingList.length)];
        if (!locks.tail) activeParts.tail = tailList[Math.floor(Math.random() * tailList.length)];
        if (!locks.pattern) currentPattern = patternList[Math.floor(Math.random() * patternList.length)];
        
        if (main.model) {
            const sceneSymbol = Object.getOwnPropertySymbols(main).find(s => s.description === 'scene');
            const scene = main[sceneSymbol];
            if (scene) {
                scene.traverse((obj) => {
                    if (obj.isMesh || obj.isGroup) {
                        const name = obj.name.toLowerCase();
                        if(tailList.includes(name)) obj.visible = (name === activeParts.tail.toLowerCase());
                    }
                });
            }
        }
        updateAll();
    }

    function randomizeColors() {
        const rnd = () => hslToRgb(Math.random() * 360, 0.7, 0.55);
        if (!locks['primary-color']) colors.primary = rnd();
        if (!locks['secondary-color']) colors.secondary = rnd();
        if (!locks['tertiary-color']) colors.tertiary = rnd();
        if (!locks['eye-color']) colors.eye = rnd();
        updateAll();
    }

    async function processTexture(imgSrc, isEye = false) {
        const img = new Image(); img.crossOrigin = "anonymous"; img.src = imgSrc;
        await img.decode();
        offscreenCanvas.width = img.width; offscreenCanvas.height = img.height;
        offscreenCtx.drawImage(img, 0, 0);
        const imageData = offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height), data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2];
            if (isEye) {
                if (r > 120 && g > 100) {
                    const factor = (r + g) / 510;
                    data[i] = colors.eye.r * factor; data[i+1] = colors.eye.g * factor; data[i+2] = colors.eye.b * factor;
                } else { data[i] = 0; data[i+1] = 0; data[i+2] = 0; }
                data[i+3] = 255;
            } else {
                const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                if (lum < 0.03) continue;
                let target = null;
                if (r > 60 && r > g * 1.5 && r > b * 1.5) target = colors.primary;
                else if (g > 70 && ((r > 70) || (g > r * 1.1)) && b < 170) target = colors.secondary;
                else if (b > 50 || (r > 100 && b > 100)) target = colors.tertiary;
                if (target) { data[i] = target.r; data[i+1] = target.g; data[i+2] = target.b; }
            }
        }
        offscreenCtx.putImageData(imageData, 0, 0);
        return offscreenCanvas.toDataURL();
    }

    function togglePart(type, name) {
        activeParts[type] = name;
        if (!main.model) return;
        const sceneSymbol = Object.getOwnPropertySymbols(main).find(s => s.description === 'scene');
        const scene = main[sceneSymbol];
        if (!scene) return;
        scene.traverse((obj) => {
            if (obj.isMesh || obj.isGroup) {
                const nodeName = obj.name.toLowerCase();
                if (type === 'eye') {
                    if(nodeName.includes('mesh_eyes_normal')) obj.visible = (name === 'Mesh_Eyes_Normal');
                    if(nodeName.includes('mesh_eyes_lashes')) obj.visible = (name === 'Mesh_Eyes_Lashes');
                } else {
                    let catMatch = false;
                    if(type === 'crest' && crestList.includes(nodeName)) catMatch = true;
                    if (type === 'wing' && wingList.includes(nodeName)) catMatch = true;
                    if (type === 'tail' && tailList.includes(nodeName)) catMatch = true;
                    if(catMatch) obj.visible = (nodeName === name.toLowerCase());
                }
            }
        });
    }

    async function updateAll() {
        if (!main.model) return;
        const bodyBake = await processTexture(currentPattern);
        const wingBake = await processTexture('Griffin_Wings.png');
        const tcBake = await processTexture('Griffin_Tails_Crests.png');
        const eyeBake = await processTexture(currentEyeShape, true);
        const materialMap = { "Mat_GriffinBody": bodyBake, "Mat_Wings": wingBake, "Mat_Tails_Crests": tcBake, "Mat_Eyes": eyeBake };
        for (const mat of main.model.materials) {
            const texData = materialMap[mat.name];
            if (texData) {
                const tex = await main.createTexture(texData);
                if(mat.pbrMetallicRoughness.baseColorTexture) mat.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
            }
        }
        Object.keys(activeParts).forEach(type => togglePart(type, activeParts[type]));
        const loader = document.getElementById('loading-overlay');
        if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 1000); }
    }

    function switchPalette(type, paletteName) {
        const container = document.getElementById(`${type}-container`);
        container.querySelectorAll('.palette-group').forEach(pg => {
            pg.classList.toggle('active', pg.getAttribute('data-name') === paletteName);
        });
    }

    ["primary", "secondary", "tertiary", "eye"].forEach(type => {
        const container = document.getElementById(`${type}-container`);
        const select = container.previousElementSibling;
        paletteData.forEach((p, idx) => {
            const opt = document.createElement('option');
            opt.value = p.name; opt.textContent = p.name;
            select.appendChild(opt);

            const pg = document.createElement('div');
            pg.className = "palette-group";
            if(idx === 0) pg.classList.add('active');
            pg.setAttribute('data-name', p.name);
            pg.innerHTML = `<div class="color-grid"></div>`;
            container.appendChild(pg);
            const grid = pg.querySelector('.color-grid');
            for(let i=0; i<p.count; i++) {
                const h = (i * 360) / p.count;
                const s = document.createElement('div');
                s.className = "swatch"; s.style.background = `hsl(${h}, 70%, 55%)`;
                s.onclick = () => { colors[type] = hslToRgb(h, 0.7, 0.55); updateAll(); };
                grid.appendChild(s);
            }
        });
    });

    function changeEyeShape(f) { currentEyeShape = f; updateAll(); }
    function changePattern(f) { currentPattern = f; updateAll(); }
    function hslToRgb(h, s, l) {
        const f = (n, k = (n + h / 30) % 12) => l - s * Math.min(l, 1 - l) * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return { r: Math.round(f(0) * 255), g: Math.round(f(8) * 255), b: Math.round(f(4) * 255) };
    }
    main.addEventListener('load', updateAll);
</script>
</body>
</html>
