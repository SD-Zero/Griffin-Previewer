<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Character Creator</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* 3D VIEWPORT */
        .viewer-container { flex: 1; position: relative; background: radial-gradient(#333, #000); }
        model-viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* TOUCH FIX: Main body at front for touch, but parts follow camera */
        #griffin { z-index: 10; pointer-events: auto; }
        #crest-v, #wings-v, #tail-v { z-index: 5; pointer-events: none; }

        /* SIDEBAR */
        .sidebar { 
            width: 320px; 
            background: #222; 
            border-left: 2px solid #ff9d00; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto;
            padding: 15px;
        }

        h2 { font-size: 18px; color: #ff9d00; margin-top: 0; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }

        /* ACCORDION (Details) */
        details { margin-bottom: 5px; background: #2d2d2d; border-radius: 5px; border: 1px solid #444; }
        summary { 
            padding: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            background: #333; 
            list-style: none;
            display: flex;
            justify-content: space-between;
        }
        summary::after { content: '▶'; font-size: 10px; color: #ff9d00; transition: 0.2s; }
        details[open] summary::after { content: '▼'; }

        .button-stack { display: flex; flex-direction: column; padding: 10px; gap: 5px; max-height: 400px; overflow-y: auto; }
        
        /* COLOR PALETTE STYLING */
        .palette-group { border-bottom: 1px solid #444; padding: 10px 0; }
        .palette-name { font-size: 13px; font-weight: bold; color: #ccc; margin-bottom: 5px; display: block; }
        .palette-img { width: 100%; height: 25px; background: #444; border-radius: 3px; cursor: pointer; margin-bottom: 8px; border: 1px solid #555; }
        
        /* Placeholder for where color dots will go later */
        .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; padding-bottom: 10px; }
        .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 3px; border: 1px solid #222; cursor: pointer; }
        
        button { 
            background: #444; color: white; border: 1px solid #555; padding: 10px; 
            text-align: left; cursor: pointer; border-radius: 4px; font-size: 13px; 
        }
        button:active { background: #ff9d00; color: black; }
        .random-btn { background: #3d3d3d; border: 1px dashed #ff9d00; color: #ff9d00; text-align: center; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="viewer-container">
    <model-viewer id="griffin" src="Griffin_LQ_Body_Mesh.glb" camera-controls interaction-prompt="none" shadow-intensity="1" exposure="1.2"></model-viewer>
    <model-viewer id="crest-v" src="" interaction-prompt="none" center-model="false"></model-viewer>
    <model-viewer id="wings-v" src="" interaction-prompt="none" center-model="false"></model-viewer>
    <model-viewer id="tail-v" src="" interaction-prompt="none" center-model="false"></model-viewer>
</div>

<div class="sidebar">
    <h2>GRIFFIN EDITOR</h2>

    <details name="editor">
        <summary>Patterns</summary>
        <div class="button-stack">
            <button onclick="changePattern('Griffin_Pattern00_HQ.png')">Drifter</button>
            <button onclick="changePattern('Griffin_Pattern01_HQ.png')">Duochrome</button>
            <button onclick="changePattern('Griffin_Pattern02_HQ.png')">Shining</button>
            <button onclick="changePattern('Griffin_Pattern03_HQ.png')">Stealthy</button>
            <button onclick="changePattern('Griffin_Pattern04_HQ.png')">Harfang</button>
        </div>
    </details>

    <details name="editor">
        <summary>Crests</summary>
        <div class="button-stack">
            <button onclick="changePart('crest', 'Bestial_Crest.glb')">Bestial</button>
            <button onclick="changePart('crest', 'Pinnacle_Crest.glb')">Pinnacle</button>
            <button onclick="changePart('crest', 'Windswept_Crest.glb')">Windswept</button>
            <button onclick="changePart('crest', 'Harpy_Crest.glb')">Harpy</button>
            <button onclick="changePart('crest', '')">None</button>
        </div>
    </details>

    <details name="editor">
        <summary>Wings</summary>
        <div class="button-stack">
            <button onclick="changePart('wings', 'Heroic_Wings.glb')">Heroic</button>
            <button onclick="changePart('wings', 'Osprey_Wings.glb')">Osprey</button>
            <button onclick="changePart('wings', 'Manticore_Wings.glb')">Manticore</button>
            <button onclick="changePart('wings', 'Scarab_Wings.glb')">Scarab</button>
            <button onclick="changePart('wings', 'Seraph_Wings.glb')">Seraph</button>
            <button onclick="changePart('wings', '')">None</button>
        </div>
    </details>

    <details name="editor">
        <summary>Tails</summary>
        <div class="button-stack">
            <button onclick="changePart('tail', 'Fanned_Tail.glb')">Fanned</button>
            <button onclick="changePart('tail', 'Quetzal_Tail.glb')">Quetzal</button>
            <button onclick="changePart('tail', 'Svelte_Tail.glb')">Svelte</button>
            <button onclick="changePart('tail', 'Tufted_Tail.glb')">Tufted</button>
            <button onclick="changePart('tail', 'Scorpio_Tail.glb')">Scorpio</button>
            <button onclick="changePart('tail', '')">None</button>
        </div>
    </details>

    <details name="editor">
        <summary>Primary Color</summary>
        <div class="button-stack" id="primary-palettes">
            </div>
    </details>

    <details name="editor">
        <summary>Secondary Color</summary>
        <div class="button-stack" id="secondary-palettes">
            </div>
    </details>

    <details name="editor">
        <summary>Tertiary Color</summary>
        <div class="button-stack" id="tertiary-palettes">
            </div>
    </details>
</div>

<script>
    const main = document.querySelector('#griffin');
    const parts = { crest: document.querySelector('#crest-v'), wings: document.querySelector('#wings-v'), tail: document.querySelector('#tail-v') };
    let currentPattern = 'Griffin_Pattern00_HQ.png';

    // CAMERA SYNC
    main.addEventListener('camera-change', () => {
        const orbit = main.cameraOrbit;
        const fov = main.fieldOfView;
        const target = main.getCameraTarget();
        Object.values(parts).forEach(v => {
            v.cameraOrbit = orbit;
            v.fieldOfView = fov;
            v.cameraTarget = `${target.x}m ${target.y}m ${target.z}m`;
        });
    });

    // PART/PATTERN LOGIC
    async function changePattern(fileName) { currentPattern = fileName; applyPatternToAll(); }
    function changePart(type, file) { const target = parts[type]; target.src = file; target.addEventListener('load', () => applyPatternToAll(), { once: true }); }
    async function applyPatternToAll() {
        const viewers = [main, ...Object.values(parts)];
        for (const v of viewers) {
            if (v.src && v.model) {
                const texture = await v.createTexture(currentPattern);
                v.model.materials.forEach(mat => { if (mat.pbrMetallicRoughness.baseColorTexture) mat.pbrMetallicRoughness.baseColorTexture.setTexture(texture); });
            }
        }
    }

    // COLOR PALETTE GENERATION
    const palettes = [
        { name: "Amethyst Wildflower", count: 12 }, { name: "Cerulean Sky", count: 14 }, { name: "Dreamy Lilac", count: 15 },
        { name: "Dusty Taupe", count: 13 }, { name: "Earthy Umber", count: 15 }, { name: "Flaxen Ochre", count: 16 },
        { name: "Florid Vermillion", count: 14 }, { name: "Forested Juniper", count: 14 }, { name: "Hazel Olive", count: 15 },
        { name: "Lush Berry", count: 13 }, { name: "Misty Starlight", count: 13 }, { name: "Oceanic Sapphire", count: 15 },
        { name: "Opulant Royalty", count: 14 }, { name: "Pale Pastel", count: 15 }, { name: "Rosy Sunset", count: 14 },
        { name: "Russet Mahogany", count: 12 }, { name: "Seafoam Lagoon", count: 14 }, { name: "Shady Dark", count: 17 },
        { name: "Smoky Dust", count: 13 }, { name: "Sunny Amber", count: 14 }, { name: "Verdant Lush", count: 15 },
        { name: "Vibrant Neon", count: 18 }, { name: "Warm Tangerine", count: 15 }
    ];

    function setupPalettes() {
        ["primary", "secondary", "tertiary"].forEach(section => {
            const container = document.getElementById(`${section}-palettes`);
            palettes.forEach(p => {
                const div = document.createElement('div');
                div.className = 'palette-group';
                div.innerHTML = `
                    <span class="palette-name">${p.name} (${p.count})</span>
                    <div class="palette-img" title="Select Palette"></div>
                    <div class="color-grid" id="${section}-${p.name}-colors" style="display:none;"></div>
                    <button class="random-btn" onclick="randomizeColor('${section}', '${p.name}')">RANDOM</button>
                `;
                container.appendChild(div);
            });
        });
    }

    function randomizeColor(section, paletteName) {
        alert(`Randomly selecting color from ${paletteName} for ${section} color slot!`);
        // Logic for actually changing model color will go here once you provide hex codes.
    }

    setupPalettes();
</script>

</body>
</html>
