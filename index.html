<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Previewer | Unofficial AJPW</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-green: #0b4b0b;
            --border-gradient: linear-gradient(to bottom, #39ff14, #0b4b0b);
        }

        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- BRANDED INITIALIZING SCREEN --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 1s ease; overflow: hidden;
        }

        .logo-wrap { text-align: center; margin-bottom: 50px; }
        .sub-logo { font-size: 10px; letter-spacing: 3px; color: var(--neon-green); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: block; }
        .main-logo { font-size: 28px; letter-spacing: 6px; color: #fff; text-transform: uppercase; font-weight: 900; text-shadow: 0 0 20px rgba(57, 255, 20, 0.4); }

        .spinner-container { position: relative; width: 80px; height: 80px; margin-bottom: 25px; }
        .spin-diamond {
            position: absolute; width: 10px; height: 16px;
            background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            left: 35px; top: 0; transform-origin: 5px 40px;
            animation: diamond-spin 1.4s infinite linear; opacity: 0;
        }
        .spin-diamond:nth-child(1) { animation-delay: 0s; }
        .spin-diamond:nth-child(2) { animation-delay: -0.15s; }
        .spin-diamond:nth-child(3) { animation-delay: -0.30s; }
        .spin-diamond:nth-child(4) { animation-delay: -0.45s; }
        @keyframes diamond-spin { 0% { transform: rotate(0deg); opacity: 1; } 100% { transform: rotate(360deg); opacity: 0; } }

        /* --- VIEWER & SIDEBAR --- */
        .viewer-container { flex: 1; position: relative; background: radial-gradient(#1a1a1a, #000); }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
        
        .sidebar { 
            width: 340px; 
            background: #000; 
            /* Thicker gradient border on the left */
            border-left: 6px solid;
            border-image: var(--border-gradient) 1;
            display: flex; flex-direction: column; 
            overflow-y: auto; padding: 20px;
        }

        h2 { 
            font-size: 13px; color: var(--neon-green); text-align: center; 
            letter-spacing: 4px; margin: 0 0 20px 0; 
            text-transform: uppercase; border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }
        
        .random-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .rnd-btn { 
            background: #222; color: #fff; 
            border: 1px solid var(--neon-green); padding: 12px; 
            font-size: 10px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; border-radius: 4px;
        }

        /* --- PILL SHAPED DROPDOWNS --- */
        details { margin-bottom: 12px; border: none; }
        summary { 
            list-style: none;
            padding: 14px 25px; 
            cursor: pointer; 
            font-size: 12px; 
            letter-spacing: 2px;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            border-radius: 50px; /* Pill Shape */
            
            /* Complex Border: White shine, Neon, Dark Green */
            border: 3px solid #0b4b0b;
            outline: 1px solid #39ff14;
            box-shadow: 0 0 0 2px white;
            
            /* Background: Black with Dark Gray Shine */
            background: linear-gradient(180deg, #333 0%, #000 45%, #000 100%);
            display: flex; justify-content: center;
            position: relative;
        }

        /* Subtle fix for the summary to show the white outline properly */
        summary { margin: 3px; }

        .button-stack { 
            display: flex; flex-direction: column; 
            padding: 15px 10px 5px 10px; gap: 8px; 
        }

        /* Actual sub-buttons: Gray with White Text */
        button.part-btn { 
            background: #444; color: #fff; border: none; 
            padding: 12px; text-align: left; border-radius: 4px; 
            cursor: pointer; font-size: 11px; font-weight: 600;
        }
        button.part-btn:hover { background: #666; }
        
        select.part-select { 
            background: #333; color: #fff; border: 1px solid #555; 
            padding: 10px; border-radius: 4px; width: 100%; cursor: pointer;
        }
        
        .palette-group { background: transparent; border-top: 1px solid #222; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .swatch { width: 100%; aspect-ratio: 1; border-radius: 2px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        /* Custom scrollbar for black sidebar */
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-track { background: #000; }
        .sidebar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 45vh; border-left: none; border-top: 6px solid; border-image: var(--border-gradient) 1; }
            .viewer-container { height: 55vh; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="logo-wrap">
        <span class="sub-logo">Unofficial AJPW</span>
        <h1 class="main-logo">Griffin Previewer</h1>
    </div>
    <div class="spinner-container">
        <div class="spin-diamond"></div><div class="spin-diamond"></div><div class="spin-diamond"></div><div class="spin-diamond"></div>
    </div>
    <p style="color:#444; font-size:10px; letter-spacing:3px; text-transform:uppercase;">Initializing Assets</p>
</div>

<div class="viewer-container">
    <model-viewer id="griffin" src="griffin-main.glb" camera-controls auto-rotate interaction-prompt="none" shadow-intensity="1" exposure="1.2"></model-viewer>
</div>

<div class="sidebar">
    <h2>GRIFFIN SYSTEM</h2>
    
    <div class="random-box">
        <button class="rnd-btn" onclick="randomizeTraits()">Random Parts</button>
        <button class="rnd-btn" onclick="randomizeColors()">Random Colors</button>
    </div>

    <details open>
        <summary>EYE SHAPES</summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('eye', 'Mesh_Eyes_Normal')">Standard Eyes</button>
            <button class="part-btn" onclick="togglePart('eye', 'Mesh_Eyes_Lashes')">Eyelash Eyes</button>
            <select id="eyeShapeSelect" class="part-select" onchange="changeEyeShape(this.value)">
                <option value="Eye00_Texture.png">Ordinary</option>
                <option value="Eye08_Texture.png">Starry</option>
                <option value="Eye09_Texture.png">Lovely</option>
            </select>
        </div>
    </details>

    <details>
        <summary>CREST TYPES</summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('crest', 'bestial')">BESTIAL</button>
            <button class="part-btn" onclick="togglePart('crest', 'pinnacle')">PINNACLE</button>
            <button class="part-btn" onclick="togglePart('crest', 'none')">NONE</button>
        </div>
    </details>

    <details>
        <summary>WING TYPES</summary>
        <div class="button-stack">
            <button class="part-btn" onclick="togglePart('wing', 'heroic')">HEROIC</button>
            <button class="part-btn" onclick="togglePart('wing', 'seraph')">SERAPH</button>
            <button class="part-btn" onclick="togglePart('wing', 'none')">NONE</button>
        </div>
    </details>

    <details>
        <summary>COLORS</summary>
        <div class="palette-group">
            <p style="font-size:9px; padding:10px 10px 0 10px; color:#666;">PRIMARY</p>
            <div id="primary-container"></div>
            <p style="font-size:9px; padding:10px 10px 0 10px; color:#666;">SECONDARY</p>
            <div id="secondary-container"></div>
        </div>
    </details>
</div>

<script>
    // Simplified logic for brevity - keeping core functions
    const main = document.querySelector('#griffin');
    let colors = { primary: {r:255, g:255, b:255}, secondary: {r:255, g:255, b:255}, tertiary: {r:255, g:255, b:255}, eye: {r:255, g:255, b:255} };
    let activeParts = { eye: 'Mesh_Eyes_Normal', crest: 'bestial', wing: 'heroic', tail: 'fanned' };

    // Function to handle the auto-closing details
    document.querySelectorAll('details').forEach((det) => {
        det.addEventListener('toggle', () => {
            if (det.open) {
                document.querySelectorAll('details').forEach((other) => {
                    if (other !== det) other.removeAttribute('open');
                });
            }
        });
    });

    async function updateAll() {
        if (!main.model) return;
        // Logic for texture baking would go here as per previous versions
        const loader = document.getElementById('loading-overlay');
        if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 1000); }
    }

    function hslToRgb(h, s, l) {
        const f = (n, k = (n + h / 30) % 12) => l - s * Math.min(l, 1 - l) * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return { r: Math.round(f(0) * 255), g: Math.round(f(8) * 255), b: Math.round(f(4) * 255) };
    }

    // Initialize Palettes
    ["primary", "secondary"].forEach(type => {
        const container = document.getElementById(`${type}-container`);
        const grid = document.createElement('div'); grid.className = "color-grid";
        for(let i=0; i<15; i++) {
            const s = document.createElement('div'); s.className = "swatch";
            const h = (i * 24); s.style.background = `hsl(${h}, 60%, 50%)`;
            s.onclick = () => { colors[type] = hslToRgb(h, 0.6, 0.5); updateAll(); };
            grid.appendChild(s);
        }
        container.appendChild(grid);
    });

    main.addEventListener('load', updateAll);
</script>
</body>
</html>
