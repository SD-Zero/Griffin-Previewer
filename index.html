<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Character Creator</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .viewer-container { flex: 1; position: relative; background: radial-gradient(#333, #000); }
        model-viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #griffin { z-index: 1; pointer-events: auto; }
        .part-layer { z-index: 2; pointer-events: none; }

        .sidebar { 
            width: 320px; background: #222; border-left: 2px solid #ff9d00; 
            display: flex; flex-direction: column; overflow-y: auto; padding: 15px;
        }

        h2 { font-size: 18px; color: #ff9d00; text-align: center; margin-top: 0; }

        /* Accordion Styling */
        details { margin-bottom: 5px; background: #2d2d2d; border-radius: 5px; }
        summary { 
            padding: 12px; font-weight: bold; cursor: pointer; background: #333; 
            display: flex; justify-content: space-between; list-style: none;
        }
        summary::after { content: '▶'; font-size: 10px; color: #ff9d00; transition: 0.2s; }
        details[open] summary::after { content: '▼'; }

        .content-box { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Palette Styling */
        .palette-group { border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px; }
        .palette-name { font-size: 13px; font-weight: bold; color: #ccc; margin-bottom: 5px; display: block; }
        .palette-img { width: 100%; height: 30px; background: #444; border-radius: 3px; margin-bottom: 8px; object-fit: cover; border: 1px solid #555; }
        
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 5px; }
        .color-swatch { aspect-ratio: 1; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        
        button { 
            background: #444; color: white; border: 1px solid #555; 
            padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer; 
        }
        button:hover { border-color: #ff9d00; }
        .random-btn { background: #333; border: 1px dashed #ff9d00; color: #ff9d00; width: 100%; }
    </style>
</head>
<body>

<div class="viewer-container">
    <model-viewer id="griffin" src="Griffin_LQ_Body_Mesh.glb" camera-controls interaction-prompt="none" exposure="1.2"></model-viewer>
    <model-viewer id="crest-v" class="part-layer" src="" interaction-prompt="none" center-model="false"></model-viewer>
    <model-viewer id="wings-v" class="part-layer" src="" interaction-prompt="none" center-model="false"></model-viewer>
    <model-viewer id="tail-v" class="part-layer" src="" interaction-prompt="none" center-model="false"></model-viewer>
</div>

<div class="sidebar">
    <h2>GRIFFIN EDITOR</h2>

    <details name="menu">
        <summary>Patterns</summary>
        <div class="content-box">
            <button onclick="changePattern('Griffin_Pattern00_HQ.png')">Drifter</button>
            <button onclick="changePattern('Griffin_Pattern01_HQ.png')">Duochrome</button>
            <button onclick="changePattern('Griffin_Pattern02_HQ.png')">Shining</button>
            <button onclick="changePattern('Griffin_Pattern03_HQ.png')">Stealthy</button>
            <button onclick="changePattern('Griffin_Pattern04_HQ.png')">Harfang</button>
        </div>
    </details>

    <details name="menu">
        <summary>Crests</summary>
        <div class="content-box">
            <button onclick="changePart('crest', 'Bestial_Crest.glb')">Bestial</button>
            <button onclick="changePart('crest', 'Pinnacle_Crest.glb')">Pinnacle</button>
            <button onclick="changePart('crest', 'Windswept_Crest.glb')">Windswept</button>
            <button onclick="changePart('crest', 'Harpy_Crest.glb')">Harpy</button>
            <button onclick="changePart('crest', '')">None</button>
        </div>
    </details>

    <details name="menu"><summary>Primary Color</summary><div class="content-box" id="primary-box"></div></details>
    <details name="menu"><summary>Secondary Color</summary><div class="content-box" id="secondary-box"></div></details>
    <details name="menu"><summary>Tertiary Color</summary><div class="content-box" id="tertiary-box"></div></details>
</div>

<script>
    const main = document.querySelector('#griffin');
    const parts = { crest: document.querySelector('#crest-v'), wings: document.querySelector('#wings-v'), tail: document.querySelector('#tail-v') };
    
    // Palette List
    const palettes = [
        { name: "Amethyst Wildflower", count: 12 }, { name: "Cerulean Sky", count: 14 },
        { name: "Dreamy Lilac", count: 15 }, { name: "Dusty Taupe", count: 13 },
        { name: "Earthy Umber", count: 15 }, { name: "Flaxen Ochre", count: 16 },
        { name: "Florid Vermillion", count: 14 }, { name: "Forested Juniper", count: 14 },
        { name: "Hazel Olive", count: 15 }, { name: "Lush Berry", count: 13 },
        { name: "Misty Starlight", count: 13 }, { name: "Oceanic Sapphire", count: 15 },
        { name: "Opulant Royalty", count: 14 }, { name: "Pale Pastel", count: 15 },
        { name: "Rosy Sunset", count: 14 }, { name: "Russet Mahogany", count: 12 },
        { name: "Seafoam Lagoon", count: 14 }, { name: "Shady Dark", count: 17 },
        { name: "Smoky Dust", count: 13 }, { name: "Sunny Amber", count: 14 },
        { name: "Verdant Lush", count: 15 }, { name: "Vibrant Neon", count: 18 },
        { name: "Warm Tangerine", count: 15 }
    ];

    // Generate Color UI
    ["primary", "secondary", "tertiary"].forEach(type => {
        const container = document.getElementById(`${type}-box`);
        palettes.forEach(p => {
            const group = document.createElement('div');
            group.className = 'palette-group';
            group.innerHTML = `
                <span class="palette-name">${p.name} (${p.count})</span>
                <img class="palette-img" src="${p.name.replace(/ /g, '_')}_Palette.png" alt="Wait for image...">
                <div class="color-grid" id="${type}-${p.name}-grid"></div>
                <button class="random-btn" onclick="randomColor('${type}', '${p.name}', ${p.count})">RANDOM</button>
            `;
            container.appendChild(group);
            
            // Placeholder swatches
            const grid = group.querySelector('.color-grid');
            for(let i=0; i<p.count; i++) {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.background = '#444'; // Replace with hex later
                grid.appendChild(swatch);
            }
        });
    });

    function randomColor(type, paletteName, count) {
        const randomIndex = Math.floor(Math.random() * count);
        console.log(`Randomly picked color ${randomIndex} from ${paletteName} for ${type}`);
        // Color application logic goes here later
    }

    // Standard Part Sync
    main.addEventListener('camera-change', () => {
        const orbit = main.cameraOrbit;
        const target = main.getCameraTarget();
        Object.values(parts).forEach(v => {
            v.cameraOrbit = orbit;
            v.fieldOfView = main.fieldOfView;
            v.cameraTarget = `${target.x}m ${target.y}m ${target.z}m`;
        });
    });

    function changePart(type, file) {
        parts[type].src = file;
    }
</script>
</body>
</html>
