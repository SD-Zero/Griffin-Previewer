<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Fix</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; text-align: center; }
        #status-box { 
            background: #444; 
            padding: 15px; 
            margin: 10px; 
            border-radius: 10px; 
            font-weight: bold; 
            border: 2px solid #ff9d00;
        }
        .viewer-area { width: 100vw; height: 70vh; background: #222; position: relative; }
        model-viewer { width: 100%; height: 100%; }
        .controls { padding: 20px; }
        button { background: #ff9d00; border: none; padding: 15px 25px; border-radius: 8px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-box">
        STATUS: <span id="status-text" style="color: #ff9d00;">INITIALIZING...</span>
    </div>

    <div class="viewer-area">
        <model-viewer id="griffin" 
            src="Griffin_LQ_Body_Mesh.glb" 
            camera-controls 
            auto-rotate 
            bounds="tight"
            exposure="1"
            loading="eager">
            
            <div slot="poster" style="color: #888; margin-top: 100px;">
                Looking for Griffin_LQ_Body_Mesh.glb...
            </div>
        </model-viewer>
    </div>

    <div class="controls">
        <button onclick="location.reload(true)">FORCE REFRESH</button>
    </div>

<script>
    const viewer = document.querySelector('#griffin');
    const statusText = document.querySelector('#status-text');

    // 1. Check if the engine even loads
    setTimeout(() => {
        if (statusText.innerText === "INITIALIZING...") {
            statusText.innerText = "ENGINE FAILED (Try Refreshing)";
            statusText.style.color = "red";
        }
    }, 5000);

    // 2. If the file is missing
    viewer.addEventListener('error', (e) => {
        statusText.innerText = "FILE NOT FOUND (Check Names!)";
        statusText.style.color = "red";
        console.log(e);
    });

    // 3. If it works!
    viewer.addEventListener('load', () => {
        statusText.innerText = "ONLINE - GRIFFIN LOADED!";
        statusText.style.color = "#2ecc71";
    });
</script>

</body>
</html>
