<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin Previewer</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: #222; text-align: center; border-bottom: 2px solid #ff9d00; }
        .viewer-container { flex: 1; position: relative; background: radial-gradient(#333, #000); overflow: hidden; }
        
        /* The Base Griffin */
        #griffin { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* The Crest Layer - We disable auto-centering and zoom */
        #crest-layer { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; 
            pointer-events: none; 
            z-index: 2;
        }
        
        .ui-panel { padding: 15px; background: #222; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; z-index: 100; }
        .group { border: 1px solid #444; padding: 10px; border-radius: 10px; background: #2d2d2d; text-align: center; }
        button { background: #444; color: white; border: 1px solid #666; padding: 10px; border-radius: 5px; }
        button:active { background: #ff9d00; color: black; }
    </style>
</head>
<body>

<header><h2 style="margin:0;">Griffin Previewer</h2></header>

<div class="viewer-container">
    <model-viewer id="griffin" 
        src="Griffin_LQ_Body_Mesh.glb" 
        camera-controls 
        auto-rotate 
        bounds="tight" 
        exposure="1.2">
    </model-viewer>

    <model-viewer id="crest-layer" 
        src="Crest_1.glb" 
        exposure="1.2"
        interaction-prompt="none"
        loading="eager"
        auto-rotate-delay="0">
    </model-viewer>
</div>

<div class="ui-panel">
    <div class="group">
        <h4>Patterns</h4>
        <button onclick="applyAll('Griffin_Pattern00_HQ.png')">00</button>
        <button onclick="applyAll('Griffin_Pattern01_HQ.png')">01</button>
        <button onclick="applyAll('Griffin_Pattern02_HQ.png')">02</button>
    </div>
    <div class="group">
        <h4>Crest</h4>
        <button onclick="toggleCrest(true)">Show</button>
        <button onclick="toggleCrest(false)">Hide</button>
    </div>
</div>

<script>
    const main = document.querySelector('#griffin');
    const crest = document.querySelector('#crest-layer');

    // This is a more aggressive sync
    const sync = () => {
        // We force the crest to use the EXACT orbital values of the main model
        crest.cameraOrbit = main.cameraOrbit;
        crest.fieldOfView = main.fieldOfView;
        
        // We calculate the target so the 'center' of the crest's view 
        // is actually the center of the griffin
        const target = main.getCameraTarget();
        crest.cameraTarget = `${target.x}m ${target.y}m ${target.z}m`;
    };

    main.addEventListener('camera-change', sync);
    
    // Also sync the auto-rotation
    setInterval(() => {
        if(main.autoRotate) {
            crest.cameraOrbit = main.cameraOrbit;
        }
    }, 16);

    async function applyAll(img) {
        const texture = await main.createTexture(img);
        [main, crest].forEach(v => {
            if (v.model) {
                v.model.materials.forEach(mat => {
                    if (mat.pbrMetallicRoughness.baseColorTexture) {
                        mat.pbrMetallicRoughness.baseColorTexture.setTexture(texture);
                    }
                });
            }
        });
    }

    function toggleCrest(show) {
        crest.style.visibility = show ? "visible" : "hidden";
    }
</script>

</body>
</html>
